# Runs on the server in /home/users/rene/www/next.rene-van-dinter.de.
# Deployed by user `deployer` (member of group `rene`); pulls the prebuilt image
# from GHCR, never builds. Lives next to a `.env.production` (mode 640, rene:rene)
# holding the mail secrets + AUTH_SECRET/ADMIN_PASSWORD + ANALYTICS_SALT.
#
# WICHTIG: Der Deploy-Workflow kopiert diese Datei NICHT auf den Server — dort
# liegt eine eigene Kopie. Das `volumes:`-Mapping unten muss daher einmalig
# auch in der Server-Kopie ergänzt und das Verzeichnis ./data angelegt werden,
# sonst gehen die Analytics-Daten bei jedem Deploy verloren.
services:
  prod:
    image: ghcr.io/wizzard26/rvdportfolio:latest
    container_name: rd-portfolio-prod
    restart: on-failure
    ports:
      - "3001:3000"
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
    volumes:
      # Persistiert die SQLite-Datenbanken über Deploys hinweg:
      # - analytics.db (ANALYTICS_DB_PATH=/app/data/analytics.db)
      # - content.db  (redaktionelle Inhalte wie die Vita; Pfad wird automatisch
      #   aus dem Analytics-Verzeichnis abgeleitet → /app/data/content.db, kein
      #   zusätzlicher Env-Eintrag nötig).
      - ./data:/app/data
